<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peachza Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --peach:      #FFB38A;
  --peach-l:    #FFD4B8;
  --peach-glow: rgba(255,179,138,0.35);
  --pink:       #FF6B9D;
  --pink-glow:  rgba(255,107,157,0.3);
  --cream:      #FFF5EE;
  --bg:         #0A0608;
  --card:       rgba(255,255,255,0.04);
  --cb:         rgba(255,179,138,0.15);
  --cbh:        rgba(255,179,138,0.45);
  --dim:        rgba(255,245,238,0.5);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 50px 16px 70px;
  overflow-x: hidden;
}

/* ══ CURSOR ══ */
.cursor {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--peach);
  position: fixed;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%,-50%);
  transition: width .2s, height .2s, background .2s;
  mix-blend-mode: screen;
}
.cursor-ring {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(255,179,138,0.5);
  position: fixed;
  pointer-events: none;
  z-index: 99998;
  transform: translate(-50%,-50%);
  transition: transform .12s ease, width .25s, height .25s, border-color .25s;
}
body:hover .cursor { opacity:1; }

/* ══ BACKGROUND ══ */
.bg-layer {
  position: fixed; inset: 0; z-index: -2;
  background:
    radial-gradient(ellipse 70% 50% at 15% 20%, rgba(255,107,157,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 85% 75%, rgba(255,179,138,0.10) 0%, transparent 60%),
    #0A0608;
}
/* aurora */
.aurora {
  position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden;
}
.aurora-band {
  position: absolute;
  width: 200%; height: 180px;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0;
  animation: auroraMove 8s ease-in-out infinite;
}
.aurora-band:nth-child(1) {
  background: linear-gradient(90deg, transparent, rgba(255,107,157,0.15), rgba(255,179,138,0.12), transparent);
  top: 15%; left: -50%;
  animation-delay: 0s;
}
.aurora-band:nth-child(2) {
  background: linear-gradient(90deg, transparent, rgba(167,139,250,0.1), rgba(255,107,157,0.1), transparent);
  top: 40%; left: -50%;
  animation-delay: 2.5s;
}
.aurora-band:nth-child(3) {
  background: linear-gradient(90deg, transparent, rgba(255,179,138,0.12), rgba(255,107,157,0.08), transparent);
  top: 65%; left: -50%;
  animation-delay: 5s;
}
@keyframes auroraMove {
  0%   { left:-50%; opacity:0; }
  15%  { opacity:1; }
  85%  { opacity:1; }
  100% { left:50%;  opacity:0; }
}

canvas#star-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ══ ENTRY ══ */
#entry-layer {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column;
  justify-content: center; align-items: center; gap: 24px;
  cursor: pointer;
  transition: opacity 1s ease, visibility 1s;
}
#entry-layer.fade-out { opacity:0; visibility:hidden; }

.entry-rings {
  position: relative; width: 100px; height: 100px;
  display: flex; align-items: center; justify-content: center;
}
.entry-logo {
  width: 80px; height: 80px; border-radius: 50%;
  object-fit: cover; position: relative; z-index: 3;
  animation: entryFloat 3s ease-in-out infinite;
}
@keyframes entryFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}
.e-ring {
  position: absolute; border-radius: 50%; border: 1px solid transparent;
  animation: spinRing linear infinite;
}
.e-ring-1 {
  inset: -10px;
  border-top-color: var(--peach);
  border-right-color: var(--pink);
  animation-duration: 3s;
}
.e-ring-2 {
  inset: -20px;
  border-bottom-color: rgba(255,179,138,0.4);
  border-left-color: rgba(255,107,157,0.4);
  animation-duration: 5s;
  animation-direction: reverse;
}
.e-ring-3 {
  inset: -32px;
  border-top-color: rgba(255,179,138,0.15);
  border-right-color: rgba(167,139,250,0.15);
  animation-duration: 8s;
}
@keyframes spinRing { to { transform:rotate(360deg); } }

.entry-glow {
  position: absolute; inset: -10px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,107,157,0.2), transparent 70%);
  animation: glowPulse 2s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100% { transform:scale(1); opacity:.6; }
  50%      { transform:scale(1.3); opacity:1; }
}

.entry-title {
  font-family: 'Outfit', sans-serif;
  font-size: 22px; font-weight: 700;
  background: linear-gradient(135deg, var(--peach-l), var(--pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: 4px; text-transform: uppercase;
  animation: titleShimmer 3s ease-in-out infinite;
}
@keyframes titleShimmer {
  0%,100% { filter:brightness(1); }
  50%      { filter:brightness(1.3) drop-shadow(0 0 12px rgba(255,107,157,0.6)); }
}

.entry-hint {
  font-size: 10px; letter-spacing: 4px;
  color: var(--dim); text-transform: uppercase;
  animation: blink 2s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

/* ══ PARTICLES (canvas handled by JS) ══ */

/* ══ MAIN CONTAINER ══ */
.container {
  width: 100%; max-width: 420px;
  display: flex; flex-direction: column; gap: 10px;
  position: relative; z-index: 2;
  opacity: 1; transform: none;
  transition: opacity .8s ease, transform .8s ease;
}
.container.hidden { opacity:0; transform:translateY(16px); }

/* stagger children on reveal */
.container > * {
  opacity: 0; transform: translateY(20px);
  transition: opacity .6s ease, transform .6s ease;
}
.container.revealed > *:nth-child(1) { transition-delay:.05s; }
.container.revealed > *:nth-child(2) { transition-delay:.15s; }
.container.revealed > *:nth-child(3) { transition-delay:.25s; }
.container.revealed > *:nth-child(4) { transition-delay:.32s; }
.container.revealed > *:nth-child(5) { transition-delay:.40s; }
.container.revealed > * { opacity:1; transform:none; }

/* ══ CARD BASE ══ */
.card {
  background: var(--card);
  border: 1px solid var(--cb);
  border-radius: 20px;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  transition: border-color .3s, box-shadow .3s;
}
.card:hover {
  border-color: var(--cbh);
  box-shadow: 0 0 40px rgba(255,179,138,0.1), 0 0 80px rgba(255,107,157,0.05);
}

/* ══ PROFILE CARD ══ */
.profile-card {
  padding: 28px 20px 22px;
  display: flex; flex-direction: column; align-items: center; text-align: center;
  position: relative; overflow: hidden;
}

/* animated top streak */
.profile-card::before {
  content: '';
  position: absolute; top: 0; left: -100%; width: 300%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--peach), var(--pink), transparent);
  animation: streakSlide 4s linear infinite;
}
@keyframes streakSlide { to { left: 100%; } }

/* corner sparkles */
.profile-card::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(circle 40px at 0% 0%,   rgba(255,179,138,0.06), transparent),
    radial-gradient(circle 40px at 100% 0%,  rgba(255,107,157,0.06), transparent),
    radial-gradient(circle 40px at 0% 100%,  rgba(167,139,250,0.04), transparent),
    radial-gradient(circle 40px at 100% 100%,rgba(255,179,138,0.04), transparent);
  pointer-events: none;
}

/* ── avatar ── */
.avatar-wrap {
  position: relative;
  margin-bottom: 18px;
  width: 160px; height: 160px;
  flex-shrink: 0;
}

#eq-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 160px; height: 160px;
  z-index: 5;
  pointer-events: none;
}

.avatar {
  width: 96px; height: 96px; border-radius: 50%;
  object-fit: cover;
  position: absolute;
  top: 50%; left: 50%;
  margin-top: -48px; margin-left: -48px;
  z-index: 3;
}

/* triple ring — use margin centering so spinRing keyframe doesn't kill translate */
.avatar-ring {
  position: absolute; border-radius: 50%; z-index: 1;
  top: 50%; left: 50%;
}
.avatar-ring-1 {
  width: 104px; height: 104px;
  margin-top: -52px; margin-left: -52px;
  background: conic-gradient(var(--peach), var(--pink), #a78bfa, var(--peach));
  animation: spinRing 3s linear infinite;
}
.avatar-ring-1::after {
  content:''; position:absolute; inset:3px; border-radius:50%; background:#14090d;
}
.avatar-ring-2 {
  width: 116px; height: 116px;
  margin-top: -58px; margin-left: -58px;
  border: 1px solid rgba(255,179,138,0.2);
  animation: spinRing 6s linear infinite reverse;
}
.avatar-ring-3 {
  width: 130px; height: 130px;
  margin-top: -65px; margin-left: -65px;
  border: 1px dashed rgba(255,107,157,0.1);
  animation: spinRing 12s linear infinite;
}

.view-badge {
  position: absolute;
  bottom: 6px; right: 2px; z-index: 4;
  background: rgba(10,6,8,0.9); border: 1px solid var(--cb);
  border-radius: 20px; padding: 3px 8px;
  font-size: 10px; color: var(--dim);
  display: flex; align-items: center; gap: 4px; white-space: nowrap;
}
.view-badge i { color: var(--peach); font-size: 9px; }

/* ── name ── */
.profile-name {
  font-family: 'Outfit', sans-serif;
  font-size: 21px; font-weight: 800; letter-spacing: 1px;
  background: linear-gradient(135deg, #fff 30%, var(--peach-l));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  position: relative;
}
/* name underline sweep */
.profile-name::after {
  content: '';
  position: absolute; bottom: -3px; left: 50%; transform: translateX(-50%);
  width: 0; height: 1px;
  background: linear-gradient(90deg, var(--peach), var(--pink));
  transition: width .5s ease;
}
.profile-card:hover .profile-name::after { width: 100%; }

.profile-role {
  margin-top: 5px; font-size: 11px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--dim);
}

.divider {
  width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,179,138,0.12), transparent);
  margin: 14px 0;
}

/* ── bio tags ── */
.profile-bio { margin-top: 2px; }
.bio-tag {
  display: inline-block;
  background: rgba(255,179,138,0.08);
  border: 1px solid rgba(255,179,138,0.2);
  border-radius: 20px; padding: 3px 10px;
  font-size: 10px; color: var(--peach-l);
  margin: 3px 2px; letter-spacing: .5px;
  transition: background .2s, border-color .2s, transform .2s, box-shadow .2s;
}
.bio-tag:hover {
  background: rgba(255,179,138,0.18);
  border-color: rgba(255,179,138,0.5);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(255,179,138,0.2);
}

/* ── socials ── */
.socials { display: flex; justify-content: center; gap: 7px; }
.social-btn {
  width: 38px; height: 38px; border-radius: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  color: var(--dim); font-size: 15px; text-decoration: none;
  transition: all .25s; position: relative; overflow: hidden;
}
.social-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,179,138,0.2), rgba(255,107,157,0.15));
  opacity: 0; transition: opacity .25s;
}
.social-btn:hover::before { opacity: 1; }
.social-btn:hover {
  border-color: rgba(255,179,138,0.45);
  color: var(--peach-l);
  transform: translateY(-3px) scale(1.08);
  box-shadow: 0 6px 18px rgba(255,107,157,0.2);
}

/* ══ CTA BUTTON ══ */
.cta-btn {
  display: flex; align-items: center; justify-content: center;
  gap: 12px;
  padding: 0 20px; height: 64px;
  border-radius: 20px; text-decoration: none; color: var(--cream);
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: .5px;
  position: relative; overflow: hidden;
  background: linear-gradient(135deg, rgba(255,107,157,0.12), rgba(255,179,138,0.08));
  border: 1px solid rgba(255,179,138,0.25);
  transition: all .3s;
}
/* animated shimmer sweep */
.cta-btn::before {
  content: '';
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  animation: ctaSweep 3s ease-in-out infinite;
}
@keyframes ctaSweep { 0%{left:-60%} 100%{left:150%} }
.cta-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--pink), var(--peach));
  opacity: 0; transition: opacity .3s;
}
.cta-btn:hover::after { opacity:.1; }
.cta-btn:hover {
  border-color: rgba(255,179,138,0.6);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(255,107,157,0.25), 0 0 50px rgba(255,179,138,0.1);
}

.cta-left {
  display: flex; align-items: center; gap: 12px;
  position: relative; z-index: 1;
  flex: 0 0 auto;
}
.cta-icon {
  width: 40px; height: 40px; border-radius: 12px;
  object-fit: cover; border: 1px solid rgba(255,179,138,0.2);
}
.cta-arrow { display: none; }

/* ══ LINK CARDS ══ */
.link-list { display: flex; flex-direction: column; gap: 8px; }

.link-card {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; border-radius: 16px;
  text-decoration: none; color: var(--cream);
  background: var(--card); border: 1px solid var(--cb);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  position: relative; overflow: hidden;
  transition: all .25s;
}
/* left glow bar */
.link-card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
  background: linear-gradient(180deg, var(--peach), var(--pink));
  opacity: 0; transition: opacity .3s;
}
/* inner shine */
.link-card::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(100deg, rgba(255,179,138,0.05) 0%, transparent 50%);
  opacity: 0; transition: opacity .3s;
}
.link-card:hover::before, .link-card:hover::after { opacity: 1; }
.link-card:hover {
  border-color: var(--cbh);
  background: rgba(255,179,138,0.06);
  transform: translateX(5px);
  box-shadow: 0 4px 24px rgba(255,179,138,0.1), -4px 0 20px rgba(255,107,157,0.1);
}

.link-left { display: flex; align-items: center; gap: 12px; }

.link-img {
  width: 42px; height: 42px; border-radius: 12px; object-fit: cover;
  border: 1px solid rgba(255,179,138,0.15); background: #1a1015; flex-shrink: 0;
  transition: box-shadow .3s;
}
.link-card:hover .link-img {
  box-shadow: 0 0 12px rgba(255,179,138,0.25);
}

.link-info h3 {
  font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600;
}
.link-info .sub { font-size: 11px; color: var(--dim); margin-top: 1px; }

.status-row { display: flex; align-items: center; gap: 5px; margin-top: 3px; }
.online-dot {
  width: 6px; height: 6px; background: #4ade80;
  border-radius: 50%; position: relative; flex-shrink: 0;
}
.online-dot::after {
  content: '';
  position: absolute; inset: 0; border-radius: 50%; background: #4ade80;
  animation: dotPulse 2s ease-out infinite;
}
@keyframes dotPulse { 0%{transform:scale(1);opacity:.7} 100%{transform:scale(3.5);opacity:0} }
.status-text { font-size: 11px; color: #4ade80; }

.join-pill {
  padding: 6px 14px; border-radius: 20px;
  font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: .5px;
  flex-shrink: 0; transition: filter .2s, transform .2s, box-shadow .2s;
}
.link-card:hover .join-pill { filter: brightness(1.15); transform: scale(1.05); }
.pill-discord { background: linear-gradient(135deg, #5865F2, #7289DA); color: #fff; }
.pill-roblox  { background: linear-gradient(135deg, #E52207, #FF4444); color: #fff; }

/* ══ FOOTER ══ */
.footer {
  text-align: center; font-size: 10px; letter-spacing: 2px;
  color: rgba(255,245,238,0.2); text-transform: uppercase; padding: 8px 0;
}

/* ══ FLOATING SPARKLES ══ */
.sparkle {
  position: fixed; pointer-events: none; z-index: 99997;
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--peach);
  animation: sparkleFade 1s ease-out forwards;
}
@keyframes sparkleFade {
  0%   { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx),var(--dy)) scale(0); }
}

@media (max-width:380px) {
  .profile-name { font-size: 18px; }
  .avatar { width: 84px; height: 84px; }
  .cta-btn { font-size: 13px; height: 58px; }
}
</style>
</head>

        <div class="link-info">
          <h3>Peachza Store</h3>
          <div class="status-row"><span class="online-dot"></span><span class="status-text">Online</span></div>
          <div class="sub">143 Members · Discord</div>
        </div>
      </div>
      <div class="join-pill pill-discord">Join</div>
    </a>
  </div>

  <div class="footer">© Peachza Store · All rights reserved</div>
</div>

<script>
/* ══ CUSTOM CURSOR ══ */
const cur = document.getElementById('cur');
const ring = document.getElementById('cur-ring');
let mx=0, my=0, rx=0, ry=0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cur.style.left = mx+'px'; cur.style.top = my+'px';
});
(function cursorLoop(){
  rx += (mx-rx) * 0.12;
  ry += (my-ry) * 0.12;
  ring.style.left = rx+'px'; ring.style.top = ry+'px';
  requestAnimationFrame(cursorLoop);
})();
document.querySelectorAll('a,.bio-tag').forEach(el=>{
  el.addEventListener('mouseenter',()=>{
    cur.style.width='18px'; cur.style.height='18px';
    ring.style.width='52px'; ring.style.height='52px';
    ring.style.borderColor='rgba(255,107,157,0.7)';
  });
  el.addEventListener('mouseleave',()=>{
    cur.style.width='10px'; cur.style.height='10px';
    ring.style.width='36px'; ring.style.height='36px';
    ring.style.borderColor='rgba(255,179,138,0.5)';
  });
});

/* ══ SPARKLES ON CLICK ══ */
document.addEventListener('click', e => {
  if(e.target.closest('#entry-layer')) return;
  const colors = ['#FFB38A','#FF6B9D','#FFD4B8','#a78bfa','#ffffff'];
  for(let i=0;i<7;i++){
    const s = document.createElement('div');
    s.className='sparkle';
    const angle = (Math.PI*2/7)*i;
    const dist = 30+Math.random()*30;
    s.style.left = e.clientX+'px';
    s.style.top  = e.clientY+'px';
    s.style.setProperty('--dx', Math.cos(angle)*dist+'px');
    s.style.setProperty('--dy', Math.sin(angle)*dist+'px');
    s.style.background = colors[Math.floor(Math.random()*colors.length)];
    s.style.width = s.style.height = (3+Math.random()*4)+'px';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 1000);
  }
});

/* ══ SHOOTING STARS ══ */
const canvas = document.getElementById('star-canvas');
const ctx    = canvas.getContext('2d');
let stars = [];
function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; }
window.addEventListener('resize', resize); resize();

class Star {
  constructor(){ this.reset(true); }
  reset(init=false){
    if(!init && Math.random()>.5){ this.x=Math.random()*canvas.width; this.y=-70; }
    else if(!init){ this.x=-70; this.y=Math.random()*canvas.height; }
    else{ this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; }
    this.len  = 60+Math.random()*120;
    this.spd  = 3+Math.random()*7;
    this.size = .4+Math.random()*1.4;
    this.op   = 0;
    this.max  = .06+Math.random()*.25;
    this.hue  = Math.random()>.5 ? '255,179,138' : Math.random()>.5 ? '255,107,157' : '255,255,255';
  }
  draw(){
    const tx=this.x-this.len*.7, ty=this.y-this.len*.35;
    const g=ctx.createLinearGradient(this.x,this.y,tx,ty);
    g.addColorStop(0,`rgba(${this.hue},${this.op})`);
    g.addColorStop(1,`rgba(${this.hue},0)`);
    ctx.beginPath(); ctx.strokeStyle=g; ctx.lineWidth=this.size; ctx.lineCap='round';
    ctx.moveTo(this.x,this.y); ctx.lineTo(tx,ty); ctx.stroke();
  }
  update(){
    this.x+=this.spd; this.y+=this.spd*.5;
    if(this.op<this.max) this.op+=.008;
    if(this.x>canvas.width+80||this.y>canvas.height+80) this.reset();
  }
}
for(let i=0;i<18;i++) stars.push(new Star());
(function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{s.update();s.draw();});
  requestAnimationFrame(loop);
})();

/* ══ AUDIO + ENTER ══ */
let audioCtx, analyser, src;

function startWeb(){
  const layer  = document.getElementById('entry-layer');
  const music  = document.getElementById('bg-music');
  const avatar = document.getElementById('avatar-img');
  const mc     = document.getElementById('main-container');

  if(!audioCtx){
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser(); analyser.fftSize=256;
    src = audioCtx.createMediaElementSource(music);
    src.connect(audioCtx.destination); src.connect(analyser);
  }
  if(audioCtx.state==='suspended') audioCtx.resume();

  music.play().then(()=>{
    /* ══ CIRCULAR EQ ══ */
    const eqCanvas = document.getElementById('eq-canvas');
    const eqCtx    = eqCanvas.getContext('2d');
    eqCanvas.width  = 160;
    eqCanvas.height = 160;

    const BARS   = 64;
    const CX     = 80, CY = 80;
    const INNER  = 60;   // sits just outside ring-2 (116px/2 = 58 + gap)
    const MAX_H  = 16;   // max bar height in px
    const freqData = new Uint8Array(analyser.frequencyBinCount);
    let smoothed   = new Float32Array(BARS).fill(0);

    (function eqLoop(){
      requestAnimationFrame(eqLoop);
      analyser.getByteFrequencyData(freqData);
      eqCtx.clearRect(0, 0, 160, 160);

      for(let i = 0; i < BARS; i++){
        // map bar index → freq bin (focus on lower half = bass/mids)
        const bin    = Math.floor(i / BARS * (analyser.frequencyBinCount * 0.6));
        const target = freqData[bin] / 255;
        // smooth with lerp
        smoothed[i] += (target - smoothed[i]) * 0.22;

        const angle  = (i / BARS) * Math.PI * 2 - Math.PI / 2;
        const h      = smoothed[i] * MAX_H;
        const x1     = CX + Math.cos(angle) * INNER;
        const y1     = CY + Math.sin(angle) * INNER;
        const x2     = CX + Math.cos(angle) * (INNER + h);
        const y2     = CY + Math.sin(angle) * (INNER + h);

        // color: peach → pink gradient around the ring
        const t      = i / BARS;
        const rC     = 255;
        const gC     = Math.round(179 - t * 72);   // 179→107
        const bC     = Math.round(138 + t * 19);   // 138→157
        const alpha  = 0.25 + smoothed[i] * 0.75;

        eqCtx.beginPath();
        eqCtx.moveTo(x1, y1);
        eqCtx.lineTo(x2, y2);
        eqCtx.strokeStyle = `rgba(${rC},${gC},${bC},${alpha})`;
        eqCtx.lineWidth   = 2.2;
        eqCtx.lineCap     = 'round';
        eqCtx.stroke();
      }
    })();
  }).catch(()=>{});

  layer.classList.add('fade-out');
  setTimeout(()=>layer.style.display='none', 1000);

  mc.classList.remove('hidden');
  setTimeout(()=>mc.classList.add('revealed'), 80);
}

/* hide on load */
document.getElementById('main-container').classList.add('hidden');
</script>
</body>
